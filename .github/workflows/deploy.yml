name: Auto Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via Git Pull
    runs-on: ubuntu-latest

    steps:
      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            cd /var/www/medigo || exit 1
            git fetch --all 2>&1
            git reset --hard origin/main 2>&1
            npm ci 2>&1
            npm run build 2>&1 || { echo "Build failed"; exit 1; }
            pm2 delete medigo 2>/dev/null || true
            pm2 start ecosystem.config.js 2>&1
            pm2 save 2>&1 || true
